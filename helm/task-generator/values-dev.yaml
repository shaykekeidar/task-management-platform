namespace: task-generator-dev

frontend:
  replicas: 1
  image:
    repository: shaykekeidar/kub-demo-frontend
    tag: "11"
  config:
    FRONTEND_VERSION: "11"
  ingress:
    host: task-generator-dev.local
    tlsSecretName: frontend-tls
  service:
    port: 80
    targetPort: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  hpa:
    minReplicas: 1
    maxReplicas: 5
    cpuTarget: 50

users:
  replicas: 1
  image:
    repository: shaykekeidar/kub-demo-users
    tag: "1"
  service:
    port: 8080
    targetPort: 8080

auth:
  replicas: 1
  image:
    repository: shaykekeidar/kub-demo-auth
    tag: "1"
  service:
    port: 80
    targetPort: 80

tasks:
  replicas: 1
  image:
    repository: shaykekeidar/kub-demo-tasks
    tag: "1"
  service:
    port: 8000
    targetPort: 8000