apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Values.tasks.persistence.pvName }}
spec:
    capacity: 
      storage: 20Mi # how much I want
    volumeMode: Filesystem
    storageClassName: standard
    accessModes:
      - ReadWriteOnce # multiple pods but must be on the same node
    hostPath: 
      path: {{ .Values.tasks.persistence.hostPath }}
      type: DirectoryOrCreate