apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks-deployment
spec:
  replicas: {{ .Values.tasks.replicas }}
  selector:
    matchLabels:
      app: tasks
  template:
    metadata:
      labels:
        app: tasks
    spec:
      containers:
        - name: tasks
          image: "{{ .Values.tasks.image.repository }}:{{ .Values.tasks.image.tag }}"
          ports:
            - containerPort: {{ .Values.tasks.service.targetPort }}
          volumeMounts:
            - mountPath: /app/tasks
              name: tasks-volume 
          env:
          - name: TASKS_VERSION
            value: "{{ .Values.tasks.image.tag }}"

          - name: USERS_VERSION
            value: "{{ .Values.users.image.tag }}"

          - name: AUTH_VERSION
            value: "{{ .Values.auth.image.tag }}"

          - name: FRONTEND_VERSION
            value: "{{ .Values.frontend.image.tag }}"

          - name: TASKS_FOLDER
            value: "tasks"

          - name: DB_HOST
            value: postgres
          - name: DB_PORT
            value: "5432"
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_DB
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD
      volumes: 
        - name: tasks-volume
          persistentVolumeClaim:
            claimName: {{ .Values.tasks.persistence.claimName }}
      